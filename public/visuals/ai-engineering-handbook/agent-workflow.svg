<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 360 700">
  <title>Agent workflow loop</title>
  <desc>A simple loop showing an AI agent moving from a goal to planning, tool use, observing the result, and reviewing whether to continue.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#4f6655" />
    </marker>
    <style>
      .bg { fill: #fffdf8; }
      .panel { fill: #fbf8ef; stroke: #ded7c8; stroke-width: 2; }
      .strong { fill: #eef3ed; stroke: #4f6655; stroke-width: 2; }
      .title { fill: #20211d; font: 700 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #20211d; font: 700 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .note { fill: #4c4f46; font: 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .loop { fill: #747567; font: 13px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { fill: none; stroke: #4f6655; stroke-width: 2.4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="1" y="1" width="358" height="698" rx="18" />
  <rect class="panel" x="14" y="14" width="332" height="672" rx="16" />

  <text class="title" x="30" y="54">Agent workflow</text>
  <text class="note" x="30" y="80">An agent can choose its next step.</text>

  <rect class="strong" x="52" y="112" width="256" height="70" rx="12" />
  <text class="label" x="180" y="142" text-anchor="middle">Goal</text>
  <text class="note" x="180" y="164" text-anchor="middle">"Plan my trip"</text>

  <path class="arrow" d="M180 188 V222" />

  <rect class="panel" x="52" y="230" width="256" height="72" rx="12" />
  <text class="label" x="180" y="262" text-anchor="middle">Plan</text>
  <text class="note" x="180" y="284" text-anchor="middle">Pick the next useful step</text>

  <path class="arrow" d="M180 308 V342" />

  <rect class="panel" x="52" y="350" width="256" height="72" rx="12" />
  <text class="label" x="180" y="382" text-anchor="middle">Use a tool</text>
  <text class="note" x="180" y="404" text-anchor="middle">Search, file, API, calculator</text>

  <path class="arrow" d="M180 428 V462" />

  <rect class="panel" x="52" y="470" width="256" height="72" rx="12" />
  <text class="label" x="180" y="502" text-anchor="middle">Observe</text>
  <text class="note" x="180" y="524" text-anchor="middle">Read what came back</text>

  <path class="arrow" d="M180 548 V582" />

  <rect class="strong" x="52" y="590" width="256" height="66" rx="12" />
  <text class="label" x="180" y="620" text-anchor="middle">Review</text>
  <text class="note" x="180" y="642" text-anchor="middle">Answer or continue</text>

  <path class="arrow" d="M308 622 C338 622 338 266 314 266" />
  <text class="loop" x="252" y="572">loop if needed</text>
</svg>
