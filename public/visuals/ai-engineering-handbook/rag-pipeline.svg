<svg xmlns="http://www.w3.org/2000/svg" role="img" viewBox="0 0 360 700">
  <title>RAG pipeline</title>
  <desc>A vertical pipeline showing a user question, source retrieval, selected context, the language model, and a grounded answer.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M1 1 L9 5 L1 9 Z" fill="#4f6655" />
    </marker>
    <style>
      .bg { fill: #fffdf8; }
      .panel { fill: #fbf8ef; stroke: #ded7c8; stroke-width: 2; }
      .strong { fill: #eef3ed; stroke: #4f6655; stroke-width: 2; }
      .title { fill: #20211d; font: 700 22px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .label { fill: #20211d; font: 700 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .note { fill: #4c4f46; font: 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .step { fill: #4f6655; font: 700 14px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { fill: none; stroke: #4f6655; stroke-width: 2.4; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="1" y="1" width="358" height="698" rx="18" />
  <rect class="panel" x="14" y="14" width="332" height="672" rx="16" />

  <text class="title" x="30" y="54">RAG pipeline</text>
  <text class="note" x="30" y="80">The model gets source material before answering.</text>

  <rect class="strong" x="46" y="114" width="268" height="76" rx="12" />
  <text class="step" x="70" y="146">1</text>
  <text class="label" x="180" y="146" text-anchor="middle">User question</text>
  <text class="note" x="180" y="168" text-anchor="middle">"What is the policy?"</text>

  <path class="arrow" d="M180 196 V226" />

  <rect class="panel" x="46" y="234" width="268" height="78" rx="12" />
  <text class="step" x="70" y="268">2</text>
  <text class="label" x="180" y="268" text-anchor="middle">Retrieve sources</text>
  <text class="note" x="180" y="290" text-anchor="middle">Find useful documents</text>

  <path class="arrow" d="M180 318 V348" />

  <rect class="panel" x="46" y="356" width="268" height="78" rx="12" />
  <text class="step" x="70" y="390">3</text>
  <text class="label" x="180" y="390" text-anchor="middle">Add context</text>
  <text class="note" x="180" y="412" text-anchor="middle">Question plus selected facts</text>

  <path class="arrow" d="M180 440 V470" />

  <rect class="panel" x="46" y="478" width="268" height="78" rx="12" />
  <text class="step" x="70" y="512">4</text>
  <text class="label" x="180" y="512" text-anchor="middle">LLM writes</text>
  <text class="note" x="180" y="534" text-anchor="middle">Uses the added context</text>

  <path class="arrow" d="M180 562 V592" />

  <rect class="strong" x="46" y="600" width="268" height="56" rx="12" />
  <text class="label" x="180" y="636" text-anchor="middle">Grounded answer</text>
</svg>
